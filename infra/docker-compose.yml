services:
  api:
    build: ../apps/api
    env_file: ../.env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker:
    build: ../apps/api
    command: python -m app.jobs.refresh_indicators
    env_file: ../.env
    depends_on:
      - postgres
      - redis

  scheduler:
    build: ../apps/api
    command: python -m app.jobs.refresh_all
    env_file: ../.env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: economy
      POSTGRES_USER: economy
      POSTGRES_PASSWORD: economy
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
